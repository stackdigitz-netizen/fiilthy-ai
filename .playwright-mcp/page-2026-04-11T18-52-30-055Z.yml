          - paragraph [ref=e50]: Full-featured test runner with auto-waiting, assertions, tracing, and parallelism across Chromium, Firefox, and WebKit.
          - code [ref=e51]: npm init playwright@latest
          - link "Testing documentation" [ref=e53] [cursor=pointer]:
