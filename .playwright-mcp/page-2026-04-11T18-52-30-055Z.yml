        - generic [ref=e54]:
          - heading "Playwright CLI" [level=3] [ref=e55]
          - paragraph [ref=e56]: Token-efficient browser automation for coding agents like Claude Code and GitHub Copilot. Skill-based workflows without large context overhead.
          - code [ref=e57]: npm i -g @playwright/cli@latest
          - link "CLI documentation" [ref=e59] [cursor=pointer]:
