        - generic [ref=e70]:
          - generic [ref=e71]:
            - heading "Auto-wait and web-first assertions" [level=4] [ref=e72]
            - paragraph [ref=e73]: Playwright waits for elements to be actionable before performing actions. Assertions automatically retry until conditions are met. No artificial timeouts, no flaky tests.
            - heading "Test isolation" [level=4] [ref=e74]
            - paragraph [ref=e75]: Each test gets a fresh browser context — equivalent to a brand new browser profile. Full isolation with near-zero overhead. Save authentication state once and reuse it across tests.
          - generic [ref=e76]:
            - heading "Resilient locators" [level=4] [ref=e77]
            - paragraph [ref=e78]:
              - text: "Find elements with selectors that mirror how users see the page:"
              - code [ref=e79]: getByRole
              - text: ","
              - code [ref=e80]: getByLabel
              - text: ","
              - code [ref=e81]: getByPlaceholder
              - text: ","
              - code [ref=e82]: getByTestId
              - text: . No brittle CSS paths.
            - heading "Parallelism and sharding" [level=4] [ref=e83]
            - paragraph [ref=e84]: Tests run in parallel by default across all configured browsers. Shard across multiple machines for faster CI. Full cross-browser coverage on every commit.
      - generic [ref=e86]:
